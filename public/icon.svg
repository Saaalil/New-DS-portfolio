<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c8a0"/>
      <stop offset="100%" style="stop-color:#e0b090"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="laptop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#374151"/>
      <stop offset="100%" style="stop-color:#1f2937"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="252" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.6"/>
  
  <!-- Subtle glow behind character -->
  <ellipse cx="256" cy="300" rx="180" ry="120" fill="#06b6d4" opacity="0.06"/>
  
  <!-- Body / Hoodie -->
  <path d="M160 510 Q160 380 180 340 Q200 310 256 300 Q312 310 332 340 Q352 380 352 510" fill="url(#shirt)"/>
  <!-- Hoodie collar -->
  <path d="M220 310 Q256 330 292 310 Q280 325 256 328 Q232 325 220 310" fill="#2d3748" opacity="0.6"/>
  
  <!-- Neck -->
  <rect x="238" y="275" width="36" height="35" rx="8" fill="url(#skin)"/>
  
  <!-- Head -->
  <ellipse cx="256" cy="220" rx="72" ry="78" fill="url(#skin)"/>
  
  <!-- Hair -->
  <path d="M184 210 Q184 148 220 130 Q240 120 256 118 Q272 120 292 130 Q328 148 328 210 Q320 170 290 158 Q270 150 256 150 Q242 150 222 158 Q192 170 184 210Z" fill="#1a1a2e"/>
  <!-- Side hair -->
  <path d="M184 210 Q180 230 183 245 Q186 230 190 218Z" fill="#1a1a2e"/>
  <path d="M328 210 Q332 230 329 245 Q326 230 322 218Z" fill="#1a1a2e"/>
  
  <!-- Face: "SH" in terminal font -->
  <text x="256" y="238" text-anchor="middle" font-family="'Courier New', 'Consolas', monospace" font-size="58" font-weight="900" fill="#06b6d4" letter-spacing="2">SH</text>
  
  <!-- Subtle face glow -->
  <text x="256" y="238" text-anchor="middle" font-family="'Courier New', 'Consolas', monospace" font-size="58" font-weight="900" fill="#06b6d4" letter-spacing="2" opacity="0.3" filter="url(#none)">SH</text>
  
  <!-- Arms -->
  <!-- Left arm -->
  <path d="M180 340 Q160 370 150 400 Q145 415 160 420 Q175 422 190 400 Q200 380 200 360" fill="url(#shirt)" stroke="#1a2332" stroke-width="1"/>
  <!-- Right arm -->
  <path d="M332 340 Q352 370 362 400 Q367 415 352 420 Q337 422 322 400 Q312 380 312 360" fill="url(#shirt)" stroke="#1a2332" stroke-width="1"/>
  
  <!-- Hands -->
  <ellipse cx="162" cy="418" rx="16" ry="12" fill="url(#skin)"/>
  <ellipse cx="350" cy="418" rx="16" ry="12" fill="url(#skin)"/>
  
  <!-- Laptop base -->
  <rect x="135" y="415" width="242" height="14" rx="4" fill="url(#laptop)"/>
  
  <!-- Laptop screen -->
  <rect x="155" y="340" width="202" height="78" rx="6" fill="url(#laptop)" stroke="#4b5563" stroke-width="1"/>
  <rect x="162" y="347" width="188" height="64" rx="3" fill="url(#screen)"/>
  
  <!-- Code lines on screen -->
  <rect x="172" y="356" width="45" height="4" rx="2" fill="#06b6d4" opacity="0.9"/>
  <rect x="222" y="356" width="30" height="4" rx="2" fill="#8b5cf6" opacity="0.7"/>
  <rect x="172" y="365" width="25" height="4" rx="2" fill="#10b981" opacity="0.8"/>
  <rect x="202" y="365" width="55" height="4" rx="2" fill="#64748b" opacity="0.5"/>
  <rect x="182" y="374" width="60" height="4" rx="2" fill="#f59e0b" opacity="0.7"/>
  <rect x="247" y="374" width="20" height="4" rx="2" fill="#06b6d4" opacity="0.6"/>
  <rect x="182" y="383" width="35" height="4" rx="2" fill="#ec4899" opacity="0.6"/>
  <rect x="222" y="383" width="45" height="4" rx="2" fill="#64748b" opacity="0.4"/>
  <rect x="172" y="392" width="50" height="4" rx="2" fill="#06b6d4" opacity="0.8"/>
  <rect x="227" y="392" width="30" height="4" rx="2" fill="#8b5cf6" opacity="0.5"/>
  <rect x="172" y="401" width="40" height="4" rx="2" fill="#10b981" opacity="0.6"/>
  
  <!-- Blinking cursor on screen -->
  <rect x="217" y="401" width="3" height="6" rx="1" fill="#06b6d4"/>
  
  <!-- Small accent dots -->
  <circle cx="180" cy="160" r="3" fill="#06b6d4" opacity="0.4"/>
  <circle cx="340" cy="180" r="2" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="160" cy="300" r="2" fill="#06b6d4" opacity="0.3"/>
</svg>
